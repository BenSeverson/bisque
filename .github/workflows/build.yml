name: Build
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-web:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: web_ui/package-lock.json
      - run: npm ci
        working-directory: web_ui
      - run: npm run typecheck
        working-directory: web_ui
      - run: npm run lint
        working-directory: web_ui
      - run: npm run format:check
        working-directory: web_ui

  lint-c:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check C formatting
        run: find main components -name '*.c' -o -name '*.h' | xargs clang-format --dry-run --Werror

  build-ios:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4
      - name: Generate Xcode project
        run: brew install xcodegen && xcodegen generate
        working-directory: ios/Bisque
      - name: Build iOS app
        run: xcodebuild -scheme Bisque -sdk iphoneos -arch arm64 CODE_SIGNING_ALLOWED=NO -quiet
        working-directory: ios/Bisque

  build:
    needs: [lint-web, lint-c]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Build web UI
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: web_ui/package-lock.json
      - run: npm ci
        working-directory: web_ui
      - run: npm run build
        working-directory: web_ui
      - name: Gzip web assets
        working-directory: spiffs_data/www
        run: find . -type f \( -name "*.js" -o -name "*.css" -o -name "*.html" -o -name "*.svg" \) -exec gzip -9 -f {} \;
      - name: Check SPIFFS size
        run: ./scripts/check-spiffs-size.sh spiffs_data/www

      # Build firmware
      - name: Build firmware
        uses: espressif/esp-idf-ci-action@v1
        with:
          esp_idf_version: v6.0
          target: esp32s3

      # Static analysis
      - name: Install clang-tidy
        run: sudo apt-get update && sudo apt-get install -y clang-tidy
      - name: Fix build directory permissions
        run: sudo chown -R $(id -u):$(id -g) build
      - name: Fix compile_commands.json for clang-tidy
        run: |
          python3 -c "
          import json, re
          with open('build/compile_commands.json') as f:
              db = json.load(f)
          for entry in db:
              cmd = entry['command']
              # Fix Docker paths
              cmd = cmd.replace('/app/BenSeverson/bisque', '$(pwd)')
              entry['directory'] = entry['directory'].replace('/app/BenSeverson/bisque', '$(pwd)')
              # Replace Xtensa GCC/clang with system gcc
              cmd = re.sub(r'\S*xtensa-esp32s3-elf-\S+', 'gcc', cmd, count=1)
              # Strip Xtensa-specific flags that clang doesn't understand
              xtensa_flags = ['-mlongcalls', '-fno-malloc-dce', '-fno-shrink-wrap',
                  '-fno-tree-switch-conversion', '-fstrict-volatile-bitfields',
                  '-fzero-init-padding-bits=all', '-Wno-old-style-declaration',
                  '-fno-builtin-memcpy', '-fno-builtin-memset', '-fno-builtin-bzero',
                  '-fno-builtin-stpcpy', '-fno-builtin-strncpy']
              for flag in xtensa_flags:
                  cmd = cmd.replace(' ' + flag, '')
              # Remove any --target=xtensa or -target xtensa flags
              cmd = re.sub(r'-?-target[= ]\S*xtensa\S*', '', cmd)
              entry['command'] = cmd
          with open('build/compile_commands.json', 'w') as f:
              json.dump(db, f, indent=2)
          "
      - name: Run clang-tidy
        run: >
          run-clang-tidy -p build
          -header-filter='(main|components)/.*\.h$'
          -warnings-as-errors='*'
          -extra-arg=--target=x86_64-linux-gnu
          -extra-arg=-Wno-unknown-attributes
          main/main.c components/*/*.c
      - name: Install cppcheck
        run: sudo apt-get install -y cppcheck
      - name: Run cppcheck
        run: >
          cppcheck
          --enable=warning,style,performance
          --error-exitcode=1
          --suppress=missingIncludeSystem
          --suppress=unusedFunction
          main/ components/
      - name: Check firmware size
        run: ./scripts/check-firmware-size.sh build/bisque.bin

      # Upload binary
      - uses: actions/upload-artifact@v4
        with:
          name: bisque-firmware
          path: build/bisque.bin
