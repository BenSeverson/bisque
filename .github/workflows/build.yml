name: Build
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel superseded PR runs to keep CI minutes bounded. Pushes to `main`
# are not cancelled so each merge produces a complete artifact run.
concurrency:
  group: build-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

# Read-only token for all jobs; artifact upload uses the actions API and
# needs no extra scopes.
permissions:
  contents: read

jobs:
  lint-web:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: web_ui/package-lock.json
      - run: npm ci
        working-directory: web_ui
      - run: npm run typecheck
        working-directory: web_ui
      - run: npm run lint
        working-directory: web_ui
      - run: npm run format:check
        working-directory: web_ui
      # Generate JSON fixtures from the C-side API builders so the cross-
      # language contract test in web_ui/test/contracts/ has something to
      # validate. Without this, the contract suite skips with a notice.
      - name: Build host API fixtures
        run: make fixtures
      - run: npm run test:run
        working-directory: web_ui

  lint-c:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Check C formatting
        run: make lint-c

  unit-host:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Host unit tests
        run: make test-host

  ui-screenshots:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Install SDL2
        run: sudo apt-get update && sudo apt-get install -y libsdl2-dev
      - name: Resolve LVGL version
        id: lvgl
        run: |
          LVGL_VERSION=$(awk '/^  lvgl\/lvgl:/{f=1; next} f && /version:/{print $2; exit}' dependencies.lock)
          echo "version=${LVGL_VERSION}" >> "$GITHUB_OUTPUT"
      - name: Cache LVGL clone
        id: lvgl-cache
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: managed_components/lvgl__lvgl
          key: lvgl-v${{ steps.lvgl.outputs.version }}
      - name: Fetch LVGL
        if: steps.lvgl-cache.outputs.cache-hit != 'true'
        run: |
          mkdir -p managed_components
          git clone --depth 1 --branch v${{ steps.lvgl.outputs.version }} \
            https://github.com/lvgl/lvgl.git managed_components/lvgl__lvgl
      - name: Configure
        run: cmake -S simulator -B simulator/build
      - name: Build simulator
        run: cmake --build simulator/build
      - name: Prepare actual-render dir
        run: mkdir -p docs/screenshots/actual
      - name: Diff against baselines
        run: ./simulator/build/bisque_sim --diff
      - name: Upload renders on failure
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: ui-screenshots-actual
          path: docs/screenshots/actual/lcd-*.png

  # iOS companion-app build. Intentionally NOT in `build.needs:` — iOS
  # regressions don't block firmware merges. Keep that policy explicit;
  # if iOS becomes a release-blocking platform, add `build-ios` to the
  # `needs:` list on the `build` job below.
  build-ios:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
      - name: Compute version
        run: |
          echo "BISQUE_VERSION=$(./scripts/version.sh)" >> $GITHUB_ENV
          echo "BISQUE_MARKETING_VERSION=1.0.0" >> $GITHUB_ENV
          echo "BISQUE_BUILD_NUMBER=${{ github.run_number }}" >> $GITHUB_ENV
      - name: Generate Xcode project
        run: brew install xcodegen && xcodegen generate
        working-directory: ios/Bisque
      - name: Build iOS app
        run: xcodebuild -scheme Bisque -sdk iphoneos -arch arm64 CODE_SIGNING_ALLOWED=NO -quiet
        working-directory: ios/Bisque

  # Gate only on the cheap smoke checks (~13s combined) so the long
  # firmware build starts almost immediately. lint-web and ui-screenshots
  # still run in parallel and still gate the overall workflow result;
  # they just no longer delay this job's start.
  #
  # This job runs entirely inside the espressif/idf:v6.0.1 image — the
  # same image espressif/esp-idf-ci-action uses internally — and embeds
  # github/codeql-action/init + analyze so the single traced idf.py build
  # produces both bisque.bin and the CodeQL C/C++ database. This replaces
  # the separate Analyze (c-cpp) job that previously compiled the whole
  # firmware a second time in parallel under a native ESP-IDF install.
  build:
    needs: [lint-c, unit-host]
    runs-on: ubuntu-latest
    container:
      image: espressif/idf:v6.0.1
    # Override the workflow-level `contents: read` so CodeQL can upload
    # its SARIF results from this job.
    permissions:
      contents: read
      security-events: write
      actions: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
      - name: Compute version
        run: echo "BISQUE_VERSION=$(./scripts/version.sh)" >> $GITHUB_ENV

      # Build web UI (idf.py build bundles the gzipped assets into the
      # SPIFFS image, so this must precede the firmware build).
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: web_ui/package-lock.json
      - run: npm ci
        working-directory: web_ui
      - run: npm run build
        working-directory: web_ui
      - name: Gzip web assets
        run: make gzip
      - name: Check SPIFFS size
        run: make size-spiffs

      # Persist the compiler cache across runs so unchanged translation
      # units are not recompiled. restore-keys takes the most recent prior
      # cache when there is no exact SHA hit.
      - name: Cache ccache
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: .ccache
          key: esp-idf-ccache-${{ github.sha }}
          restore-keys: |
            esp-idf-ccache-
      - name: Create ccache dir
        run: mkdir -p .ccache

      # CodeQL init sits between the web build and the firmware build so
      # only the C/C++ compile is traced — npm is covered by codeql.yml's
      # javascript-typescript analysis.
      - name: Initialize CodeQL
        uses: github/codeql-action/init@7211b7c8077ea37d8641b6271f6a365a22a5fbfa # v4.36.0
        with:
          languages: c-cpp
          build-mode: manual
          config-file: ./.github/codeql/codeql-config.yml

      # The one firmware build, traced by CodeQL. GitHub bypasses the
      # image entrypoint for container jobs, so we source export.sh
      # explicitly to put idf.py and the xtensa toolchain on PATH.
      - name: Build firmware
        run: |
          export IDF_CCACHE_ENABLE=1
          export CCACHE_DIR="$PWD/.ccache"
          export CCACHE_MAXSIZE=500M
          . "$IDF_PATH/export.sh"
          idf.py set-target esp32s3
          idf.py build
          ccache --show-stats

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@7211b7c8077ea37d8641b6271f6a365a22a5fbfa # v4.36.0
        with:
          category: "/language:c-cpp"

      - name: Check firmware size
        run: make size-firmware

      # clang-tidy reuses the toolchain in the image. It runs after the
      # CodeQL analysis so its compiler invocations stay outside the
      # trace, and so a lint regression doesn't gate the SARIF upload.
      - name: Run clang-tidy
        run: |
          . "$IDF_PATH/export.sh"
          idf_tools.py install esp-clang
          eval "$(idf_tools.py export)"
          idf.py clang-check --run-clang-tidy-options="-warnings-as-errors=*" --exclude-paths managed_components

      # cppcheck does not need the IDF toolchain. We're already root in
      # the container; no sudo (it's not installed in the image).
      - name: Run cppcheck
        run: |
          apt-get update && apt-get install -y cppcheck
          make cppcheck

      # Upload binary
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: bisque-firmware-${{ env.BISQUE_VERSION }}
          path: |
            build/bisque.bin
            build/storage.bin
