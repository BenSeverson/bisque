name: Release
on:
  push:
    tags: ['v*']

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Compute version
        run: echo "BISQUE_VERSION=$(./scripts/version.sh)" >> $GITHUB_ENV

      # Web UI
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: web_ui/package-lock.json
      - run: npm ci
        working-directory: web_ui
      - run: npm run build
        working-directory: web_ui
      - name: Gzip web assets
        working-directory: spiffs_data/www
        run: find . -type f \( -name "*.js" -o -name "*.css" -o -name "*.html" -o -name "*.svg" \) -exec gzip -9 -f {} \;

      # Firmware
      - name: Build firmware
        uses: espressif/esp-idf-ci-action@v1
        with:
          esp_idf_version: v6.0
          target: esp32s3
      - name: Fix build directory permissions
        run: sudo chown -R $(id -u):$(id -g) build

      - name: Stage release artifacts
        run: |
          mkdir -p release
          cp build/bisque.bin     release/bisque-${BISQUE_VERSION}.bin
          cp build/storage.bin    release/bisque-spiffs-${BISQUE_VERSION}.bin
          cp build/bootloader/bootloader.bin release/bisque-bootloader-${BISQUE_VERSION}.bin
          cp build/partition_table/partition-table.bin release/bisque-partitions-${BISQUE_VERSION}.bin

      - uses: softprops/action-gh-release@v3
        with:
          files: release/*
          generate_release_notes: true
