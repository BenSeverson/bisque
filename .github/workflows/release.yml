name: Release
on:
  push:
    tags: ['v*']

# Serialize releases for the same tag. Tags are unique so this almost
# never fires, but it guards against accidental retag/force-push races.
concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      # Required by actions/attest-build-provenance to mint a Sigstore
      # cert and upload the attestation to the Rekor transparency log.
      id-token: write
      attestations: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
      - name: Compute version
        run: echo "BISQUE_VERSION=$(./scripts/version.sh)" >> $GITHUB_ENV

      # Web UI
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: web_ui/package-lock.json
      - run: npm ci
        working-directory: web_ui
      - run: npm run build
        working-directory: web_ui
      - name: Gzip web assets
        run: make gzip

      # Firmware
      # esp-idf-ci-action ships a moving `v1` branch (no `v1` tag); kept
      # as a branch ref. All other actions are SHA-pinned.
      - name: Build firmware
        uses: espressif/esp-idf-ci-action@v1
        with:
          esp_idf_version: v6.0.1
          target: esp32s3
      - name: Fix build directory permissions
        run: sudo chown -R $(id -u):$(id -g) build

      # Fail the release rather than publish a binary that overflows its
      # partition. `size` = size-firmware (OTA slot) + size-spiffs (web assets).
      - name: Check partition sizes
        run: make size

      - name: Stage release artifacts
        run: |
          mkdir -p release
          cp build/bisque.bin     release/bisque-${BISQUE_VERSION}.bin
          cp build/storage.bin    release/bisque-spiffs-${BISQUE_VERSION}.bin
          cp build/bootloader/bootloader.bin release/bisque-bootloader-${BISQUE_VERSION}.bin
          cp build/partition_table/partition-table.bin release/bisque-partitions-${BISQUE_VERSION}.bin
          cp build/ota_data_initial.bin release/bisque-otadata-${BISQUE_VERSION}.bin

      # OTA update manifest. Devices fetch this via the stable
      # /releases/latest/download/manifest.json URL to discover new firmware.
      - name: Generate OTA manifest
        working-directory: release
        run: |
          SHA=$(sha256sum "bisque-${BISQUE_VERSION}.bin" | awk '{print $1}')
          SIZE=$(stat -c%s "bisque-${BISQUE_VERSION}.bin")
          cat > manifest.json <<EOF
          {
            "version": "${BISQUE_VERSION}",
            "url": "https://github.com/${GITHUB_REPOSITORY}/releases/download/${GITHUB_REF_NAME}/bisque-${BISQUE_VERSION}.bin",
            "sha256": "${SHA}",
            "size": ${SIZE},
            "notes": ""
          }
          EOF
          cat manifest.json

      # Publish checksums alongside the binaries so downloaders can verify
      # integrity. Generated relative to release/ so paths in the file are
      # just the bare filenames.
      - name: Generate SHA256SUMS
        working-directory: release
        run: sha256sum * > SHA256SUMS

      # Mint a Sigstore-signed build provenance attestation for each
      # release binary. Verifiable with `gh attestation verify <file>
      # --repo <owner>/<repo>`.
      - name: Attest build provenance
        uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32 # v4.1.0
        with:
          subject-path: |
            release/bisque-*.bin
            release/SHA256SUMS

      # Publish as a draft so a human can review the artifacts and notes
      # before the release goes live. Until the draft is published, the
      # `/releases/latest/download/` OTA URLs do not resolve, so devices
      # only see new firmware after a deliberate publish. `prerelease`
      # auto-flags rc-style tags (e.g. v2.1.0-rc1); those never become
      # `latest`, so they are not served over OTA. The static body
      # (flashing/verification steps) is followed by auto-generated notes
      # from merged PRs since the last tag.
      - uses: softprops/action-gh-release@718ea10b132b3b2eba29c1007bb80653f286566b # v3.0.1
        with:
          files: release/*
          draft: true
          prerelease: ${{ contains(github.ref_name, '-') }}
          body_path: .github/release-body.md
          generate_release_notes: true
