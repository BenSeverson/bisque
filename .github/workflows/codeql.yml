name: CodeQL

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # Weekly full scan (Mon 04:27 UTC) so advisories land on code that
    # has not changed since the last push.
    - cron: '27 4 * * 1'

# Cancel superseded PR runs; let push and scheduled runs finish.
concurrency:
  group: codeql-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

permissions:
  security-events: write
  contents: read
  actions: read

jobs:
  # Detects whether a PR touches the iOS app. The Swift analysis below is
  # the only slow job (~12 min), so on PRs it runs only when ios/ (or this
  # workflow) changed. Pushes to main and the weekly schedule always run
  # Swift regardless, so the security dashboard stays fully covered.
  changes:
    name: Detect changed paths
    runs-on: ubuntu-latest
    outputs:
      ios: ${{ steps.filter.outputs.ios }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: dorny/paths-filter@fbd0ab8f3e69293af611ebaee6363fc25e6d187d # v4.0.1
        id: filter
        with:
          filters: |
            ios:
              - 'ios/**'
              - '.github/workflows/codeql.yml'

  # Buildless languages: the workflow YAML itself and the web_ui TypeScript
  # dashboard. build-mode: none extracts source directly (~1 min each).
  analyze-light:
    name: Analyze (${{ matrix.language }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        language: [actions, javascript-typescript]
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Initialize CodeQL
        uses: github/codeql-action/init@9e0d7b8d25671d64c341c19c0152d693099fb5ba # v4.35.5
        with:
          languages: ${{ matrix.language }}
          build-mode: none
          config-file: ./.github/codeql/codeql-config.yml
      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@9e0d7b8d25671d64c341c19c0152d693099fb5ba # v4.35.5
        with:
          category: "/language:${{ matrix.language }}"

  # ESP32-S3 firmware (main/ + components/). CodeQL only analyzes code it
  # watches compile, so this installs ESP-IDF natively on the runner and
  # traces idf.py directly. The Docker-based espressif/esp-idf-ci-action
  # used by build.yml is unusable here: CodeQL's tracer cannot follow the
  # compiler into a separate container.
  analyze-cpp:
    name: Analyze (c-cpp)
    runs-on: ubuntu-latest
    env:
      IDF_VERSION: v6.0.1
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      # idf.py build bundles the web dashboard into the SPIFFS image, so
      # the gzipped web assets must exist before the firmware build runs.
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: web_ui/package-lock.json
      - run: npm ci
        working-directory: web_ui
      - run: npm run build
        working-directory: web_ui
      - name: Gzip web assets
        run: make gzip

      - name: Install ESP-IDF build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y git wget flex bison gperf python3 python3-venv \
            cmake ninja-build ccache libffi-dev libssl-dev dfu-util libusb-1.0-0

      # esp-idf clone + installed tools are large and version-pinned, so
      # cache them; the install step is skipped on a cache hit.
      - name: Cache ESP-IDF toolchain
        id: idf-cache
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: |
            ~/esp-idf
            ~/.espressif
          key: esp-idf-${{ env.IDF_VERSION }}-esp32s3

      - name: Install ESP-IDF
        if: steps.idf-cache.outputs.cache-hit != 'true'
        run: |
          git clone --depth 1 -b "$IDF_VERSION" --recursive \
            https://github.com/espressif/esp-idf.git "$HOME/esp-idf"
          "$HOME/esp-idf/install.sh" esp32s3

      # Persist the compiler cache so repeat scans only recompile changed
      # translation units. restore-keys takes the most recent prior cache.
      - name: Cache ccache
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: .ccache
          key: codeql-ccache-${{ github.sha }}
          restore-keys: codeql-ccache-

      - name: Initialize CodeQL
        uses: github/codeql-action/init@9e0d7b8d25671d64c341c19c0152d693099fb5ba # v4.35.5
        with:
          languages: c-cpp
          build-mode: manual
          config-file: ./.github/codeql/codeql-config.yml

      - name: Build firmware
        run: |
          export IDF_CCACHE_ENABLE=1
          export CCACHE_DIR="$PWD/.ccache"
          export CCACHE_MAXSIZE=500M
          . "$HOME/esp-idf/export.sh"
          idf.py set-target esp32s3
          idf.py build

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@9e0d7b8d25671d64c341c19c0152d693099fb5ba # v4.35.5
        with:
          category: "/language:c-cpp"

  # iOS companion app (ios/Bisque). The .xcodeproj is generated from
  # project.yml by xcodegen, so regenerate it before the traced build.
  analyze-swift:
    name: Analyze (swift)
    needs: changes
    # Always on push/schedule; on PRs only when the iOS app changed.
    if: github.event_name != 'pull_request' || needs.changes.outputs.ios == 'true'
    runs-on: macos-15
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      # project.yml interpolates these into MARKETING_VERSION /
      # CURRENT_PROJECT_VERSION; xcodegen needs them set before generate.
      - name: Compute version
        run: |
          echo "BISQUE_MARKETING_VERSION=1.0.0" >> "$GITHUB_ENV"
          echo "BISQUE_BUILD_NUMBER=${{ github.run_number }}" >> "$GITHUB_ENV"

      # Install xcodegen before CodeQL init: the traced build shell runs
      # under Rosetta 2, and Homebrew refuses to install into the arm64
      # prefix from an x86_64 process. CodeQL only needs to trace the
      # xcodebuild compile, not the tool install.
      - name: Install xcodegen
        run: brew install xcodegen

      - name: Initialize CodeQL
        uses: github/codeql-action/init@9e0d7b8d25671d64c341c19c0152d693099fb5ba # v4.35.5
        with:
          languages: swift
          build-mode: manual
          config-file: ./.github/codeql/codeql-config.yml

      - name: Build iOS app
        working-directory: ios/Bisque
        run: |
          xcodegen generate
          xcodebuild -scheme Bisque -sdk iphoneos -arch arm64 CODE_SIGNING_ALLOWED=NO

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@9e0d7b8d25671d64c341c19c0152d693099fb5ba # v4.35.5
        with:
          category: "/language:swift"
