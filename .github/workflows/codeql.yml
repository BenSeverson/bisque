name: CodeQL

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # Weekly full scan (Mon 04:27 UTC) so advisories land on code that
    # has not changed since the last push.
    - cron: '27 4 * * 1'

# Cancel superseded PR runs; let push and scheduled runs finish.
concurrency:
  group: codeql-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

permissions:
  security-events: write
  contents: read
  actions: read

jobs:
  # Detects whether a PR touches the iOS app. The Swift analysis below is
  # the only slow job (~12 min), so on PRs it runs only when ios/ (or this
  # workflow) changed. Pushes to main and the weekly schedule always run
  # Swift regardless, so the security dashboard stays fully covered.
  changes:
    name: Detect changed paths
    runs-on: ubuntu-latest
    outputs:
      ios: ${{ steps.filter.outputs.ios }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: dorny/paths-filter@7b450fff21473bca461d4b92ce414b9d0420d706 # v4.0.2
        id: filter
        with:
          filters: |
            ios:
              - 'ios/**'
              - '.github/workflows/codeql.yml'

  # Buildless languages: the workflow YAML itself and the web_ui TypeScript
  # dashboard. build-mode: none extracts source directly (~1 min each).
  analyze-light:
    name: Analyze (${{ matrix.language }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        language: [actions, javascript-typescript]
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Initialize CodeQL
        uses: github/codeql-action/init@54f647b7e1bb85c95cddabcd46b0c578ec92bc1a # v4.36.3
        with:
          languages: ${{ matrix.language }}
          build-mode: none
          config-file: ./.github/codeql/codeql-config.yml
      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@54f647b7e1bb85c95cddabcd46b0c578ec92bc1a # v4.36.3
        with:
          category: "/language:${{ matrix.language }}"

  # iOS companion app (ios/Bisque). The .xcodeproj is generated from
  # project.yml by xcodegen, so regenerate it before the traced build.
  analyze-swift:
    name: Analyze (swift)
    needs: changes
    # Always on push/schedule; on PRs only when the iOS app changed.
    if: github.event_name != 'pull_request' || needs.changes.outputs.ios == 'true'
    runs-on: macos-15
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      # project.yml interpolates these into MARKETING_VERSION /
      # CURRENT_PROJECT_VERSION; xcodegen needs them set before generate.
      - name: Compute version
        run: |
          echo "BISQUE_MARKETING_VERSION=1.0.0" >> "$GITHUB_ENV"
          echo "BISQUE_BUILD_NUMBER=${{ github.run_number }}" >> "$GITHUB_ENV"

      # Install xcodegen before CodeQL init: the traced build shell runs
      # under Rosetta 2, and Homebrew refuses to install into the arm64
      # prefix from an x86_64 process. CodeQL only needs to trace the
      # xcodebuild compile, not the tool install.
      - name: Install xcodegen
        run: brew install xcodegen

      - name: Initialize CodeQL
        uses: github/codeql-action/init@54f647b7e1bb85c95cddabcd46b0c578ec92bc1a # v4.36.3
        with:
          languages: swift
          build-mode: manual
          config-file: ./.github/codeql/codeql-config.yml

      - name: Build iOS app
        working-directory: ios/Bisque
        run: |
          xcodegen generate
          xcodebuild -scheme Bisque -sdk iphoneos -arch arm64 CODE_SIGNING_ALLOWED=NO

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@54f647b7e1bb85c95cddabcd46b0c578ec92bc1a # v4.36.3
        with:
          category: "/language:swift"
