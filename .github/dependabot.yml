version: 2
updates:
  - package-ecosystem: npm
    directory: /web_ui
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5
    groups:
      web-ui-minor-patch:
        update-types:
          - minor
          - patch
    labels:
      - dependencies
      - web_ui
    commit-message:
      prefix: chore(web_ui)
      include: scope

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 3
    groups:
      actions-minor-patch:
        update-types:
          - minor
          - patch
    labels:
      - dependencies
      - ci
    commit-message:
      prefix: chore(ci)
      include: scope
