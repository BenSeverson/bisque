<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 200" width="800" height="200">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="50%" stop-color="#16213e"/>
      <stop offset="100%" stop-color="#0f3460"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="800" height="200" rx="16" ry="16" fill="url(#bg)"/>

  <!-- Flame/kiln icon -->
  <g transform="translate(310, 30)">
    <!-- Outer kiln shape -->
    <path d="M28 4 C20 4, 10 14, 10 28 C10 42, 18 52, 28 52 C38 52, 46 42, 46 28 C46 14, 36 4, 28 4Z"
          fill="none" stroke="#ff6b35" stroke-width="2.5"/>
    <!-- Outer flame -->
    <path d="M28 18 C24 22, 20 28, 22 34 C23 37, 26 40, 28 40 C30 40, 33 37, 34 34 C36 28, 32 22, 28 18Z"
          fill="#ff6b35" opacity="0.8"/>
    <!-- Inner flame -->
    <path d="M28 26 C26 29, 25 32, 26 35 C26.5 37, 28 38, 28 38 C28 38, 29.5 37, 30 35 C31 32, 30 29, 28 26Z"
          fill="#ffaa44"/>
  </g>

  <!-- Wordmark -->
  <text x="400" y="95" text-anchor="middle"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif"
        font-size="56" font-weight="700" fill="#e8e8e8"
        letter-spacing="-1">bisque</text>

  <!-- Tagline -->
  <text x="400" y="130" text-anchor="middle"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif"
        font-size="16" fill="#999999"
        letter-spacing="1">Open-source ESP32-S3 ceramic kiln controller</text>

  <!-- Decorative subtle line -->
  <line x1="300" y1="150" x2="500" y2="150" stroke="#ffffff" stroke-opacity="0.1" stroke-width="1"/>
</svg>
