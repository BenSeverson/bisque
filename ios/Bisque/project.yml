name: Bisque
options:
  bundleIdPrefix: com.bisque
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "16.0"
  generateEmptyDirectories: true

settings:
  base:
    SWIFT_VERSION: "6.0"
    DEVELOPMENT_TEAM: ""
    GENERATE_INFOPLIST_FILE: YES

targets:
  Bisque:
    type: application
    platform: iOS
    sources:
      - path: Bisque
        excludes:
          - "**/.DS_Store"
    settings:
      base:
        INFOPLIST_KEY_UIApplicationSceneManifest_Generation: YES
        INFOPLIST_KEY_UIApplicationSupportsIndirectInputEvents: YES
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPhone: UIInterfaceOrientationPortrait
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPad: "UIInterfaceOrientationPortrait UIInterfaceOrientationPortraitUpsideDown UIInterfaceOrientationLandscapeLeft UIInterfaceOrientationLandscapeRight"
        INFOPLIST_KEY_NSSupportsLiveActivities: YES
        PRODUCT_BUNDLE_IDENTIFIER: com.bisque.kiln-controller
        MARKETING_VERSION: ${BISQUE_MARKETING_VERSION}
        CURRENT_PROJECT_VERSION: ${BISQUE_BUILD_NUMBER}
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        SWIFT_EMIT_LOC_STRINGS: YES
        SUPPORTS_MACCATALYST: NO
    info:
      path: Bisque/Info.plist
      properties:
        NSAppTransportSecurity:
          NSAllowsLocalNetworking: true
    dependencies:
      - target: BisqueLiveActivity

  BisqueLiveActivity:
    type: app-extension
    platform: iOS
    sources:
      - path: BisqueLiveActivity
        excludes:
          - "**/.DS_Store"
      - path: Bisque/LiveActivity/FiringActivityAttributes.swift
      - path: Bisque/Models/FiringStatus.swift
    settings:
      base:
        INFOPLIST_KEY_CFBundleDisplayName: Bisque Live Activity
        INFOPLIST_KEY_NSExtension_NSExtensionPointIdentifier: com.apple.widgetkit-extension
        PRODUCT_BUNDLE_IDENTIFIER: com.bisque.kiln-controller.live-activity
        MARKETING_VERSION: ${BISQUE_MARKETING_VERSION}
        CURRENT_PROJECT_VERSION: ${BISQUE_BUILD_NUMBER}
        SWIFT_EMIT_LOC_STRINGS: YES
        SUPPORTS_MACCATALYST: NO

schemes:
  Bisque:
    build:
      targets:
        Bisque: all
        BisqueLiveActivity: all
    run:
      config: Debug
    profile:
      config: Release
    archive:
      config: Release
